<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sleep Fingerprint</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="site-nav.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 32px;
      font-family: "DM Sans", system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fcfcfc;
    }
    #viz-fingerprint { margin-bottom: 8px; text-align: center; }
    .footnote-section {
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid #e8e8e8;
      max-width: 960px;
      margin-left: auto;
      margin-right: auto;
    }
    .footnote-heading {
      margin: 0 0 8px;
      font-size: 1.15rem;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.02em;
    }
    .footnote-lede {
      margin: 0 auto 20px;
      max-width: 640px;
      text-align: center;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }
    #viz-hrv, #viz-deep { margin-bottom: 8px; text-align: center; }
    .toggle-row { margin-bottom: 12px; display: flex; align-items: center; gap: 8px; justify-content: center; }
    .toggle-row label { cursor: pointer; font-size: 12px; color: #555; }
    .chart-annotation {
      font-size: 11px;
      color: #666;
      margin: 0 auto 24px;
      max-width: 900px;
      text-align: center;
      line-height: 1.5;
    }
    #tooltip {
      position: fixed;
      padding: 10px 14px;
      background: rgba(26, 26, 26, 0.95);
      color: #f5f5f5;
      font-size: 12px;
      line-height: 1.6;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      z-index: 1000;
      font-family: "DM Sans", system-ui, sans-serif;
    }
    #tooltip.visible { opacity: 1; }
  </style>
</head>
<body data-nav="fingerprint">
  <nav class="nav" id="site-nav" aria-label="Site"></nav>
  <script src="site-nav.js"></script>

  <div id="viz-fingerprint"></div>

  <section id="footnote-hrv" class="footnote-section" aria-labelledby="footnote-hrv-title">
    <h2 id="footnote-hrv-title" class="footnote-heading">HRV balance by cycle phase</h2>
    <p class="footnote-lede">Supporting view for the fingerprint above — same cycles, aligned by follicular / luteal day (<code>data/daily.json</code>).</p>
    <div id="viz-hrv"></div>
  </section>

  <section id="footnote-deep" class="footnote-section" aria-labelledby="footnote-deep-title">
    <h2 id="footnote-deep-title" class="footnote-heading">Deep sleep by cycle phase</h2>
    <p class="footnote-lede">Supporting view with the same outlier rules as before.</p>
    <div class="toggle-row">
      <input type="checkbox" id="rollingToggle" />
      <label for="rollingToggle">Show 3-day rolling average</label>
    </div>
    <div id="viz-deep"></div>
  </section>

  <div id="tooltip"></div>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="viz/panels/fingerprint-radial.js"></script>
  <script src="viz/panels/hrv-cycle.js"></script>
  <script src="viz/panels/deep-sleep-cycle.js"></script>
</body>
</html>
