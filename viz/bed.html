<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bed canvas — couples sleep</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e4dc;
      font-family: system-ui, sans-serif;
    }
    figure {
      margin: 0;
      padding: 1rem;
    }
    canvas {
      display: block;
      max-width: min(100vw - 2rem, 1280px);
      height: auto;
      background: #f5f2eb;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }
    figcaption {
      margin-top: 0.75rem;
      font-size: 0.85rem;
      color: #5c5852;
      text-align: center;
    }
  </style>
</head>
<body>
  <figure>
    <canvas id="bed" width="1280" height="1024" aria-label="Bed illustration for sleep visualization"></canvas>
    <figcaption id="bed-cap">Loading couples data…</figcaption>
  </figure>
  <p style="text-align:center;margin-top:8px;font-size:13px;color:#555;">
    Prefer the site nav? Open <a href="../couples.html">Couples Sleep</a>.
  </p>
  <script src="bed-canvas.js"></script>
</body>
</html>
